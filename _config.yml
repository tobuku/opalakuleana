# ==========================================
# ŌPALA KULEANA — JEKYLL CONFIGURATION
# ==========================================

# Site settings
title: Ōpala Kuleana
tagline: Oahu Junk Removal
description: Professional junk removal service in Oahu, Hawaii. We remove furniture, appliances, construction debris, and more. Free estimates. Serving Ewa Beach, Honolulu, Kapolei, and all of Oahu.
author: Ōpala Kuleana
email:
url: "https://opalakuleana.com"
baseurl: ""
repository: tobuku/opalakuleana

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .gitignore
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Ōpala Kuleana"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# SEO
social:
  name: Ōpala Kuleana
  links:
    - https://opalakuleana.com
